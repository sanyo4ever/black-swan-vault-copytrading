# Enable and configure your real sources here.

sources:
  - id: hl_futures_feed
    type: hyperliquid_futures
    name: Hyperliquid Futures
    enabled: true
    max_fills_per_trader: 5
    max_traders_per_cycle: 120
    base_poll_seconds: 60
    min_poll_seconds: 20
    max_poll_seconds: 180
    priority_recency_minutes: 120
    safety_lookback_seconds: 90
    bootstrap_lookback_minutes: 180
    http_concurrency: 8
    delivery_only_subscribed: true

  - id: elite_rss_signals
    type: rss
    enabled: false
    url: https://example.com/crypto-signals.xml
    limit: 5

  - id: quantdesk_api
    type: json_api
    enabled: false
    url: https://example.com/api/signals
    method: GET
    headers:
      Authorization: Bearer REPLACE_ME
    item_path: data.signals
    field_map:
      id: id
      source: trader
      symbol: symbol
      side: side
      entry: entry
      stop_loss: stop_loss
      take_profit: take_profit
      timeframe: timeframe
      note: note
      timestamp: created_at
    static_values:
      source: QuantDesk
