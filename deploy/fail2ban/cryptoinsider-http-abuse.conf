[Definition]
# Ban repeated unauthorized/abusive requests against sensitive HTTP endpoints.
# Matches nginx combined access log lines.
failregex = ^<HOST> - .* "(?:GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS) /(?:admin(?:/[^" ]*)?|api/traders(?:\?[^" ]*)?|subscribe/[^" ]+|telegram/[^" ]+) HTTP/[0-9.]+" (?:401|403|429) [0-9]+ .*$
ignoreregex =
